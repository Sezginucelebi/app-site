<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İletişim - Alvora Software</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e293b;
  padding: 15px 30px;
}
.navbar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* Container */
.container {
  max-width: 600px;
  margin: 50px auto;
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
}

/* Form */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  outline: none;
}

textarea {
  height: 120px;
}

/* Button */
.btn {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.btn:hover {
  background: #16a34a;
}

/* WhatsApp */
.whatsapp {
  display: block;
  text-align: center;
  margin-top: 20px;
  padding: 12px;
  background: #25D366;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <a href="index.html">← Ana Sayfa</a>
</div>

<!-- Contact Form -->
<div class="container">
  <h2>İletişim</h2>
  <p>Bize mesaj gönderin</p>

  <!-- Mail Form -->
  <form action="mailto:alvora@example.com" method="post" enctype="text/plain">
    
    <input type="text" name="isim" placeholder="Adınız" required>
    
    <input type="email" name="email" placeholder="Email adresiniz" required>
    
    <textarea name="mesaj" placeholder="Mesajınız" required></textarea>
    
    <button class="btn" type="submit">Mesaj Gönder</button>
  
  </form>

  <!-- WhatsApp -->
  <a class="whatsapp" href="https://wa.me/905XXXXXXXXX" target="_blank">
    WhatsApp ile Yaz
  </a>

</div>

<!-- Footer -->
<div class="footer">
  © 2026 Alvora Software
</div>

</body>
</html>
