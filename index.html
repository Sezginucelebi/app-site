<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuroNova Software</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar"></div>

  <div class="header">
    <h1>AuroNova Software</h1>
    <p>Sadece mobil uygulamalar değil hayatınızı kolaylaştıran uygulamalar geliştiriyoruz</p>
  </div>

  <div class="apps">
    <div class="card">
      <img src="images/logo.png" class="card-img" alt="Business Card Logo">
      <h3>Business Card</h3>
      <p>Dijital kartvizit uygulaması</p>
      <a class="btn" href="#">İndir</a>
    </div>

    <div class="card">
      <img src="images/comingsoon.png" class="card-img" alt="Coming Soon">
      <h3>Yakında...</h3>
      <p>Yeni uygulama geliyor</p>
      <a class="btn">Çok Yakında</a>
    </div>
  </div>

  <div id="footer"></div>

  <script src="js/main.js"></script>
</body>
</html>
