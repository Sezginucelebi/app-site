<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alvora Software</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  text-align: center;
  padding: 60px 20px;
}

.header h1 {
  font-size: 40px;
}

.header p {
  color: #94a3b8;
}

.apps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.card h3 {
  margin: 10px 0;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #22c55e;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Alvora Software</h1>
  <p>Akıllı mobil uygulamalar geliştiriyoruz</p>
</div>

<div class="apps">

  <div class="card">
    <h3>Business Card</h3>
    <p>Dijital kartvizit uygulaması</p>
    <a class="btn" href="https://github.com/Sezginucelebi/app-site/releases/download/v1/BusineesCard.apk">
      İndir
    </a>
  </div>

  <div class="card">
    <h3>Yakında...</h3>
    <p>Yeni uygulama geliyor</p>
    <a class="btn" href="#">Çok Yakında</a>
  </div>

</div>

</body>
</html>
